name: bc_carla
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ---- Python ---------------------------------------------------------------
  - python=3.8

  # ---- PyTorch (CUDA 11.8) --------------------------------------------------
  - pytorch==2.4.1
  - torchvision==0.19.1
  - torchaudio==2.4.1
  - pytorch-cuda=11.8

  # ---- Core scientific stack ------------------------------------------------
  - numpy=1.24.4
  - scipy>=1.10.1
  - pandas>=2.0.3

  # ---- Image ----------------------------------------------------------------
  - pillow>=10.2.0
  - opencv>=4.8.0

  # ---- Data prep ------------------------------------------------------------
  - openpyxl>=3.1.2       # read .xlsx workzone annotation spreadsheet

  # ---- Training utilities ---------------------------------------------------
  - tqdm>=4.66.0
  - psutil>=5.9.0

  # ---- CARLA closed-loop dependencies --------------------------------------
  - shapely>=2.0.1        # 2D geometry / route overlap
  - networkx>=3.0         # route graph
  - pygame>=2.1.0         # optional: render window during closed-loop eval

  # ---- pip-only packages ----------------------------------------------------
  - pip
  - pip:
    - py-trees>=2.2.3     # behaviour trees (ScenarioRunner compatible)
    - xmlschema>=2.4.0    # OpenSCENARIO XML parsing
    - tabulate>=0.9.0     # result summary tables
    - distro>=1.8.0       # OS detection helper
